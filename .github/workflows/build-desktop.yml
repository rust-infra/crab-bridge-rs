name: Build Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Generate desktop icons
        run: python3 scripts/generate-desktop-icons.py

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/crabbridge-desktop
          tauriScript: cargo tauri
          tagName: v__VERSION__
          releaseName: CrabBridge v__VERSION__
          releaseBody: |
            Desktop installers for macOS, Windows, and Linux.

            Built from tag `v__VERSION__`. See [README](https://github.com/${{ github.repository }}#build-desktop-app) for usage.
          releaseDraft: true
          prerelease: false
          uploadWorkflowArtifacts: true
          args: ${{ matrix.args }}
