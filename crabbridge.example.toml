# CrabBridge configuration
# Copy to crabbridge.toml (cwd) or ~/.config/crabbridge/config.toml
#
# API keys and models come from Codex requests (env_key + request body).
# Upstream URLs are derived from provider route slugs (/deepseek/v1, /kimi/v1).

default_provider = "deepseek"

[providers.deepseek]
[providers.kimi]

[server]
bind_addr = "127.0.0.1:11435"
log_level = "info"
# max_tokens = 4096
# temperature = 0.7

[session]
db = "data/crabbridge.db"
memory_only = false
# max_sessions = 256
# ttl_hours = 168

[cache]
enabled = false
ttl_secs = 300
max_entries = 1000

[rate_limit]
rps = 0

# [advanced]
# model_map = "gpt-5.4:deepseek-v4-pro,gpt-5.5:deepseek-v4-flash"
# tool_denylist = "spawn_agent,wait_agent"
