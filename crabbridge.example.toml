# CrabBridge configuration
# Copy to crabbridge.toml (cwd) or ~/.config/crabbridge/config.toml
#
# API keys and models come from Codex requests (env_key + request body).
# You can override the upstream base URL per provider, or globally via [upstream].

# Config path can also be set with --config / CRABRIDGE_CONFIG.

default_provider = "deepseek"

[providers.deepseek]
# Optional: override the default DeepSeek base URL.
# base_url = "https://api.deepseek.com/v1"
# Optional: per-provider model map.
# model_map = "gpt-5.4:deepseek-v4-pro,gpt-5.5:deepseek-v4-flash"

[providers.kimi]
# Optional: override the default Kimi Code base URL.
# base_url = "https://api.kimi.com/coding/v1"
# Optional: per-provider model map.
# model_map = "gpt-5.4:kimi-for-coding"

# Legacy single-provider section (still supported).
# [upstream]
# base_url = "https://api.deepseek.com/v1"
# api_key = "sk-..."
# model = "deepseek-v4-pro"

[server]
bind_addr = "127.0.0.1:11435"
log_level = "info"
# max_tokens = 4096
# temperature = 0.7

[session]
db = "data/crabbridge.db"
memory_only = false
# max_sessions = 256
# ttl_hours = 168

[cache]
enabled = false
ttl_secs = 300
max_entries = 1000

[rate_limit]
rps = 0

# [advanced]
# model_map = "gpt-5.4:deepseek-v4-pro,gpt-5.5:deepseek-v4-flash"
# tool_denylist = "spawn_agent,wait_agent"
